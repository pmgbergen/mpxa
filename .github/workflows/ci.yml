# Install and run mpxa. Tests for both C++ and the Python wrappers are run.
name: MPXA_CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Do a nightly run of the tests
    - cron: '0 1 * * *'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential \
              cmake \
              libgtest-dev \
              libeigen3-dev \
              python3-pybind11 \
              pybind11-dev \
              libglu1-mesa \
              libgeos-dev \
              libffi-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[testing]

      - name: Clone and Install PorePy
        run: |
          git clone https://github.com/pmgbergen/porepy.git /tmp/porepy
          pip install /tmp/porepy

      - name: Build and run C++ tests
        run: |
          ctest --test-dir build --output-on-failure

      - name: Run Python tests
        run: |
          pytest tests/python --ignore=tests/python/porepy